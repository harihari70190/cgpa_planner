{% extends "base.html" %}
{% block title %}Log In — Smart CGPA Planner{% endblock %}
{% block content %}
  <div class="eyebrow">Welcome back</div>
  <h1>Log in to your ledger</h1>

  <form method="POST" action="{{ url_for('login') }}">
    <label for="email">Email address</label>
    <input type="email" id="email" name="email" required autofocus placeholder="you@college.edu">

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required placeholder="••••••••">

    <button type="submit" class="btn-gold full-width">Log In</button>
  </form>

  <div class="helper-text">
    New here? <a href="{{ url_for('register') }}">Create an account</a>
  </div>
{% endblock %}
